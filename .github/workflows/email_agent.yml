name: Email Agent — Daily 9 AM

on:
  schedule:
    - cron: '0 14 * * *'   # 9 AM CST (UTC-5) = 14:00 UTC
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic google-auth google-auth-oauthlib google-api-python-client python-dotenv requests

      - name: Write Gmail credential files
        run: |
          echo "${{ secrets.GMAIL_TOKEN }}" | base64 -d > token.json
          echo "${{ secrets.GMAIL_CREDENTIALS }}" | base64 -d > credentials.json
          mkdir -p memory
          echo "[]" > memory/history.json

      - name: Run email agent
        run: python agent.py
