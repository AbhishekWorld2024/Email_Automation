<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Agent Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f3f4f6; color: #111; }
  header { background: #1e293b; color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; }
  header span { font-size: 13px; color: #94a3b8; }
  .tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #e5e7eb; padding: 0 32px; }
  .tab { padding: 14px 24px; cursor: pointer; font-size: 14px; font-weight: 600; color: #6b7280; border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }
  .content { padding: 24px 32px; }
  .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  select { padding: 8px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; background: #fff; }
  button.reset { padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; background: #fff; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  th { background: #f9fafb; padding: 12px 16px; text-align: left; font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; }
  td { padding: 14px 16px; border-top: 1px solid #f3f4f6; font-size: 13px; vertical-align: top; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .High { background: #fee2e2; color: #991b1b; }
  .Medium { background: #fef3c7; color: #92400e; }
  .Low { background: #dcfce7; color: #166534; }
  .cat { background: #e0e7ff; color: #3730a3; }
  .summary { color: #6b7280; max-width: 340px; line-height: 1.5; }
  .empty { text-align: center; padding: 60px; color: #9ca3af; }
  .stat-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: #fff; border-radius: 12px; padding: 16px 24px; flex: 1; min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .stat .num { font-size: 28px; font-weight: 700; color: #4f46e5; }
  .stat .lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }
  .action-priority-high { color: #dc2626; font-weight: 600; }
  .action-priority-medium { color: #d97706; font-weight: 600; }
  .action-priority-low { color: #16a34a; font-weight: 600; }
  #actions-panel { display: none; }
</style>
</head>
<body>

<header>
  <div>📧</div>
  <div>
    <h1>Email Agent Dashboard</h1>
    <span>Classified · Prioritized · Summarized by Claude AI</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('emails')">Emails</div>
  <div class="tab" onclick="showTab('actions')">Action Items</div>
</div>

<div class="content">

  <!-- Stats -->
  <div class="stat-row" id="stats"></div>

  <!-- Emails Panel -->
  <div id="emails-panel">
    <div class="filters">
      <select id="filter-priority" onchange="loadEmails()">
        <option value="">All Priorities</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="filter-category" onchange="loadEmails()">
        <option value="">All Categories</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Finance">Finance</option>
        <option value="Newsletter">Newsletter</option>
        <option value="Support">Support</option>
      </select>
      <button class="reset" onclick="resetFilters()">Reset</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Priority</th>
          <th>Category</th>
          <th>Subject</th>
          <th>From</th>
          <th>Summary</th>
        </tr>
      </thead>
      <tbody id="email-table"></tbody>
    </table>
  </div>

  <!-- Actions Panel -->
  <div id="actions-panel">
    <table>
      <thead>
        <tr>
          <th>Task</th>
          <th>Deadline</th>
          <th>Priority</th>
          <th>From Email</th>
          <th>Added On</th>
        </tr>
      </thead>
      <tbody id="action-table"></tbody>
    </table>
  </div>

</div>

<script>
async function loadEmails() {
  const priority = document.getElementById('filter-priority').value;
  const category = document.getElementById('filter-category').value;
  const params = new URLSearchParams();
  if (priority) params.set('priority', priority);
  if (category) params.set('category', category);
  const res = await fetch('/api/emails?' + params);
  const emails = await res.json();
  const tbody = document.getElementById('email-table');
  if (!emails.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No emails found</td></tr>';
    return;
  }
  tbody.innerHTML = emails.map(e => `
    <tr>
      <td><span class="badge ${e.priority}">${e.priority}</span></td>
      <td><span class="badge cat">${e.category}</span></td>
      <td><b>${e.subject}</b></td>
      <td style="color:#6b7280;font-size:12px;">${e.from}</td>
      <td class="summary">${e.summary}</td>
    </tr>`).join('');
  loadStats(emails);
}

async function loadActions() {
  const res = await fetch('/api/actions');
  const items = await res.json();
  const tbody = document.getElementById('action-table');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No action items found</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(a => `
    <tr>
      <td><b>${a.task}</b></td>
      <td>${a.deadline || '—'}</td>
      <td class="action-priority-${a.priority}">${a.priority}</td>
      <td style="font-size:12px;color:#6b7280;">${a.from_email || '—'}</td>
      <td style="font-size:12px;color:#9ca3af;">${a.added_on || '—'}</td>
    </tr>`).join('');
}

function loadStats(emails) {
  const high = emails.filter(e => e.priority === 'High').length;
  const medium = emails.filter(e => e.priority === 'Medium').length;
  const low = emails.filter(e => e.priority === 'Low').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${emails.length}</div><div class="lbl">Total Emails</div></div>
    <div class="stat"><div class="num" style="color:#dc2626">${high}</div><div class="lbl">High Priority</div></div>
    <div class="stat"><div class="num" style="color:#d97706">${medium}</div><div class="lbl">Medium Priority</div></div>
    <div class="stat"><div class="num" style="color:#16a34a">${low}</div><div class="lbl">Low Priority</div></div>`;
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (tab === 'emails' ? 0 : 1)));
  document.getElementById('emails-panel').style.display = tab === 'emails' ? '' : 'none';
  document.getElementById('actions-panel').style.display = tab === 'actions' ? '' : 'none';
  if (tab === 'actions') loadActions();
}

function resetFilters() {
  document.getElementById('filter-priority').value = '';
  document.getElementById('filter-category').value = '';
  loadEmails();
}

loadEmails();
</script>
</body>
</html>
